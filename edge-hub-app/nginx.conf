# 1. DEFINIZIONE DELLE ZONE DI MEMORIA
limit_req_zone $binary_remote_addr zone=global_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=2r/s;

server {
    listen 80;
    server_name localhost;

    access_log off;

    # RIMOSSO: limit_req zone=global_limit burst=50 nodelay; (Rimosso dal livello server)

    # 1. BLOCCA SWAGGER E DOCS AUTOGENERATI
    location ~ ^/(docs$|docs/|redoc$|openapi\.json) {
        return 404;
    }

    # 2. STRATO RESTRITTIVO: LOGIN
    location /api/v1/auth/login {
        limit_req zone=login_limit burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # 3. STRATO ELASTICO: HEARTBEAT
    location /api/v1/agents/heartbeat {
        limit_req zone=api_limit burst=150 nodelay;
        limit_req_status 429;

        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # 4. RESTO DELLE API
    location /api/ {
        # APPLICATO QUI: Proteggiamo le API generiche (creazione siti, dashboard)
        limit_req zone=global_limit burst=50 nodelay;
        limit_req_status 429;

        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # 5. WEBSOCKETS
    location /ws/ {
        # Essendo "pulito" (senza limiti ereditati), non serve più "limit_req off;"
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        
        proxy_read_timeout 86400; 
        proxy_send_timeout 86400;
    }

    # 6. FRONTEND
    location / {
        # APPLICATO QUI: Proteggiamo il download dei file statici della dashboard
        limit_req zone=global_limit burst=50 nodelay;
        limit_req_status 429;

        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}