error_log /var/log/nginx/error.log crit;

server {
    listen 80;
    server_name localhost;

    access_log off;

    # 1. Cattura /api..., esattamente /docs, /docs/... e openapi.json
    location ~ ^/(api|docs$|docs/|openapi\.json) {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 2. Cattura WebSockets (FONDAMENTALE PER IL LIVE MONITOR)
    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeout lungo per evitare che Nginx chiuda il socket inattivo
        proxy_read_timeout 86400; 
        proxy_send_timeout 86400;
    }

    # 3. Frontend: tutto il resto viene servito qui (incluso docs.html)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}