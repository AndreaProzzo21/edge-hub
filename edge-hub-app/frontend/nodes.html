<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>EdgeHub — All Nodes</title>
<link rel="stylesheet" href="css/app.css">
</head>
<body>
<div class="shell">
  <div id="sidebar-mount"></div>
  <div class="main">
    <div class="topbar">
      <div class="breadcrumb"><span class="breadcrumb-cur">All Nodes</span></div>
      <div class="topbar-gap"></div>
      <button class="btn btn-secondary btn-sm" onclick="loadNodes()">
        <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4 2a1 1 0 011 1v2.101a7.002 7.002 0 0111.601 2.566 1 1 0 11-1.885.666A5.002 5.002 0 005.999 7H9a1 1 0 010 2H4a1 1 0 01-1-1V3a1 1 0 011-1zm.008 9.057a1 1 0 011.276.61A5.002 5.002 0 0014.001 13H11a1 1 0 110-2h5a1 1 0 11-2 0v-2.101a7.002 7.002 0 01-11.601-2.566 1 1 0 01.61-1.276z" clip-rule="evenodd"/></svg>
        Refresh
      </button>
    </div>

    <div class="page-body page-enter">
      <div class="subbar" style="margin:-24px -26px 24px;padding:10px 26px">
        <div class="filter-bar">
          <div class="search-wrap">
            <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/></svg>
            <input type="text" class="search-input" id="node-search" placeholder="Search nodes by hostname or site..." oninput="filterNodes()">
          </div>
          <div class="filter-gap"></div>
          <span class="filter-count" id="node-count"></span>
        </div>
      </div>

      <div class="card">
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th>Hostname</th><th>Status</th><th>Site ID</th><th>Agent</th><th>Last Seen</th><th></th>
            </tr></thead>
            <tbody id="nodes-tbody">
              <tr><td colspan="6"><div class="loader-row"><div class="spinner"></div> Loading…</div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="modal-node-detail" class="modal-backdrop hidden">
  <div class="modal modal-wide">
    <div class="modal-header">
      <div class="modal-title" id="nd-title">Node Details</div>
      <div class="modal-desc" id="nd-subtitle">Loading...</div>
    </div>
    <div class="modal-body" id="nd-body" style="max-height:65vh;overflow-y:auto;padding-right:10px">
        <div class="loader-row"><div class="spinner"></div> Fetching telemetry...</div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-node-detail')">Close</button>
    </div>
  </div>
</div>

<div id="modal-edit-node" class="modal-backdrop hidden">
  <div class="modal modal-sm">
    <div class="modal-header">
      <div class="modal-title">Edit Node</div>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Description</label>
        <input type="text" id="edit-node-desc" class="form-input">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-edit-node')">Cancel</button>
      <button class="btn btn-primary" id="save-node-btn" onclick="saveNode()">Save Changes</button>
    </div>
  </div>
</div>

<div id="modal-confirm" class="modal-backdrop hidden">
  <div class="modal modal-sm">
    <div class="modal-header"><div class="modal-title" id="confirm-title">Confirm</div></div>
    <div class="modal-body"><div class="danger-box"><div class="danger-box-title" id="confirm-message"></div></div></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-confirm')">Cancel</button>
      <button id="confirm-btn" class="btn btn-danger">Delete</button>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
document.getElementById('sidebar-mount').innerHTML = SIDEBAR_HTML;
let editingNodeId = null;
let allNodesList = []; // Global per la ricerca

async function init() {
  if (!(await requireAuth())) return;
  await loadNodes();
}

async function loadNodes() {
  try {
    allNodesList = await Nodes.list();
    renderNodes(allNodesList);
  } catch(e) { toast(e.message, 'error'); }
}

function renderNodes(list) {
    document.getElementById('node-count').textContent = list.length + ' node' + (list.length!==1?'s':'');
    const tbody = document.getElementById('nodes-tbody');
    if (!list.length) {
      tbody.innerHTML = `<tr><td colspan="6">${emptyState('No nodes found', 'Adjust search or register nodes')}</td></tr>`;
      return;
    }
    
    // MODIFICATO: onClick sulla riga apre il dettaglio, event.stopPropagation() nei bottoni per non sovrapporsi
    tbody.innerHTML = list.map(n => `
      <tr class="clickable" onclick="showNodeDetail('${n.id}', '${esc(n.hostname||n.id)}')">
        <td class="td-primary">${esc(n.hostname||n.id)}</td>
        <td>${statusBadge(n.status, n.offline_cycles, n.offline_alert_sent)}</td>
        <td class="mono muted">${esc(n.site_id)}</td>
        <td>${agentTypeBadge(n.agent_type)}</td>
        <td class="mono muted">${relTime(n.last_seen)}</td>
        <td class="row justify-end" style="gap:4px">
          <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation(); openEdit('${esc(n.id)}','${esc(n.description||'')}')">Edit</button>
          <button class="btn btn-ghost btn-sm" style="color:var(--danger)" onclick="event.stopPropagation(); deleteNode('${esc(n.id)}','${esc(n.hostname||n.id)}')">Delete</button>
        </td>
      </tr>`).join('');
}

function filterNodes() {
  const q = document.getElementById('node-search').value.toLowerCase();
  renderNodes(allNodesList.filter(n => 
     (n.hostname||'').toLowerCase().includes(q) || 
     (n.site_id||'').toLowerCase().includes(q) ||
     (n.description||'').toLowerCase().includes(q)
  ));
}

// Funzione globale per mostrare l'heartbeat
async function showNodeDetail(nodeId, hostname) {
    document.getElementById('nd-title').textContent = hostname;
    document.getElementById('nd-subtitle').textContent = 'Node ID: ' + nodeId;
    document.getElementById('nd-body').innerHTML = '<div class="loader-row"><div class="spinner"></div> Loading telemetry...</div>';
    openModal('modal-node-detail');

    try {
        const heartbeats = await Nodes.heartbeats(nodeId, 10);
        if (!heartbeats || heartbeats.length === 0) {
            document.getElementById('nd-body').innerHTML = emptyState('No telemetry', 'This node has not sent any heartbeats yet.');
            return;
        }

        const latest = heartbeats[0];
        const extra = latest.extra_data || {};

        let html = `<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin-bottom:20px;">`;

        // --- CARD 1: SYSTEM INFO ---
        html += `<div class="card" style="padding:16px"><div class="card-title" style="margin-bottom:12px">System Info</div>`;
        html += kvRow('IP Address', latest.ip_address);
        
        // Estraiamo OS e Versione dagli Extra Data
        if (extra.os_platform) {
            const osStr = (extra.os_version && extra.os_version !== "unknown") 
                ? `${extra.os_platform} (${extra.os_version})` 
                : extra.os_platform;
            // Usiamo capitalize (opzionale) o lo stampiamo così com'è
            html += kvRow('OS', esc(osStr));
        }

        html += kvRow('Uptime', fmtUptime(latest.uptime_seconds));
        html += kvRow('Disk Usage', fmtPct(latest.disk_usage));
        html += `</div>`;

        // --- CARD 2: EXTRA TELEMETRY ---
        html += `<div class="card" style="padding:16px"><div class="card-title" style="margin-bottom:12px">Extra Telemetry</div>`;
        if(Object.keys(extra).length === 0) {
             html += `<span class="muted" style="font-size:13px">No additional telemetry provided by agent.</span>`;
        } else {
             html += `<span class="muted" style="font-size:13px; display:block; margin-bottom:8px">Advanced metrics (Network, Load, Processes).</span>`;
             html += `<details style="font-size:12px">
                        <summary style="cursor:pointer;color:var(--accent);font-weight:500">View Raw Data</summary>
                        <pre style="background:#f1f5f9;padding:10px;border-radius:6px;margin-top:8px;white-space:pre-wrap;word-break:break-all;max-height:220px;overflow-y:auto">${esc(JSON.stringify(extra, null, 2))}</pre>
                      </details>`;
        }
        html += `</div></div>`;

        // --- TABELLA HEARTBEAT RECENTI ---
        html += `<div class="card"><div class="card-header"><div class="card-title">Recent Heartbeats</div></div>`;
        html += `<div class="table-wrap"><table><thead><tr><th>Time</th><th>CPU</th><th>RAM</th><th>Disk</th></tr></thead><tbody>`;
        html += heartbeats.map(h => `<tr>
            <td class="mono muted">${fmtDate(h.timestamp)}</td>
            <td>
              <div class="row" style="gap:7px"><div class="prog"><div class="prog-bar ${barCls(h.cpu_usage)}" style="width:${Math.min(h.cpu_usage||0,100)}%"></div></div><span class="mono">${fmtPct(h.cpu_usage)}</span></div>
            </td>
            <td>
              <div class="row" style="gap:7px"><div class="prog"><div class="prog-bar ${barCls(h.memory_usage)}" style="width:${Math.min(h.memory_usage||0,100)}%"></div></div><span class="mono">${fmtPct(h.memory_usage)}</span></div>
            </td>
            <td>${fmtPct(h.disk_usage)}</td>
        </tr>`).join('');
        html += `</tbody></table></div></div>`;

        document.getElementById('nd-body').innerHTML = html;
    } catch(e) {
        document.getElementById('nd-body').innerHTML = `<div style="color:var(--danger);padding:16px">${esc(e.message)}</div>`;
    }
}

function openEdit(id, desc) {
  editingNodeId = id;
  document.getElementById('edit-node-desc').value = desc;
  openModal('modal-edit-node');
}

async function saveNode() {
  const desc = document.getElementById('edit-node-desc').value;
  try {
    await Nodes.patch(editingNodeId, { description: desc });
    toast('Node updated');
    closeModal('modal-edit-node');
    await loadNodes();
  } catch(e) { toast(e.message, 'error'); }
}

function deleteNode(id, name) {
  confirmAction('Delete Node', `Delete node "${name}"? Token will be recycled.`, async () => {
    try { await Nodes.delete(id); toast('Node deleted'); await loadNodes(); }
    catch(e) { toast(e.message, 'error'); }
  });
}

init();
</script>
</body>
</html>
