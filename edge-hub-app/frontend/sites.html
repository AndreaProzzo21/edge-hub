<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>EdgeHub — Sites</title>
<link rel="stylesheet" href="css/app.css">
</head>
<body>
<div class="shell">
  <div id="sidebar-mount"></div>
  <div class="main">
    <div class="topbar">
      <div class="breadcrumb">
        <span class="breadcrumb-cur">Sites</span>
      </div>
      <div class="topbar-gap"></div>
      <button class="btn btn-primary" onclick="openModal('modal-create-site')">
        <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd"/></svg>
        New Site
      </button>
    </div>

    <div class="page-body page-enter">
      <div class="subbar" style="margin:-24px -26px 24px;padding:10px 26px">
        <div class="filter-bar">
          <div class="search-wrap">
            <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/></svg>
            <input type="text" class="search-input" id="site-search" placeholder="Search sites…" oninput="filterSites()">
          </div>
          <div class="filter-gap"></div>
          <span class="filter-count" id="site-count"></span>
        </div>
      </div>

      <div class="card">
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th>Name</th>
              <th>Description</th>
              <th>ID</th>
              <th>Created</th>
              <th>Alerts</th>
              <th>Nodes</th>
              <th style="text-align: right;">Actions</th>
            </tr></thead>
            <tbody id="sites-tbody">
              <tr><td colspan="7">${''}
                <div class="loader-row"><div class="spinner"></div> Loading sites…</div>
              </td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="modal-create-site" class="modal-backdrop hidden">
  <div class="modal modal-sm">
    <div class="modal-header">
      <div class="modal-title">Create Site</div>
      <div class="modal-desc">Sites group edge nodes by location or purpose.</div>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Name <span style="color:var(--danger)">*</span></label>
        <input type="text" id="new-site-name" class="form-input" placeholder="e.g. Milan DC-1">
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <input type="text" id="new-site-desc" class="form-input" placeholder="Optional description">
      </div>
      <div class="form-group">
        <label class="form-label">Discord Webhook (Optional)</label>
        <input type="url" id="new-site-discord" class="form-input" placeholder="https://discord.com/api/webhooks/...">
      </div>
      <div class="form-group">
        <label class="form-label">Slack Webhook (Optional)</label>
        <input type="url" id="new-site-slack" class="form-input" placeholder="https://hooks.slack.com/services/...">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-create-site')">Cancel</button>
      <button class="btn btn-primary" id="create-site-btn" onclick="createSite()">Create Site</button>
    </div>
  </div>
</div>

<div id="modal-edit-site" class="modal-backdrop hidden">
  <div class="modal modal-sm">
    <div class="modal-header">
      <div class="modal-title">Edit Site</div>
      <div class="modal-desc">Update site details and alert configurations.</div>
    </div>
    <div class="modal-body">
      <input type="hidden" id="edit-site-id">
      <div class="form-group">
        <label class="form-label">Name <span style="color:var(--danger)">*</span></label>
        <input type="text" id="edit-site-name" class="form-input">
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <input type="text" id="edit-site-desc" class="form-input">
      </div>
      <div class="form-group">
        <label class="form-label">Discord Webhook</label>
        <input type="url" id="edit-site-discord" class="form-input" placeholder="https://discord.com/api/webhooks/...">
      </div>
      <div class="form-group">
        <label class="form-label">Slack Webhook</label>
        <input type="url" id="edit-site-slack" class="form-input" placeholder="https://hooks.slack.com/services/...">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-edit-site')">Cancel</button>
      <button class="btn btn-primary" id="edit-site-btn" onclick="updateSite()">Save Changes</button>
    </div>
  </div>
</div>

<div id="modal-confirm" class="modal-backdrop hidden">
  <div class="modal modal-sm">
    <div class="modal-header">
      <div class="modal-title" id="confirm-title">Confirm</div>
    </div>
    <div class="modal-body">
      <div class="danger-box">
        <div class="danger-box-title">This action is irreversible</div>
        <div class="danger-box-desc" id="confirm-message"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-confirm')">Cancel</button>
      <button id="confirm-btn" class="btn btn-danger">Delete</button>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
document.getElementById('sidebar-mount').innerHTML = SIDEBAR_HTML;
let allSites = [];

async function load() {
  if (!(await requireAuth())) return;
  try {
    allSites = await Sites.list();
    renderSites(allSites);
  } catch(e) { toast(e.message, 'error'); }
}

function renderAlertBadges(s) {
  let badges = '';
  if (s.discord_webhook_url) badges += `<span class="badge" style="background:#5865F2;color:white;margin-right:4px;">Discord</span>`;
  if (s.slack_webhook_url) badges += `<span class="badge" style="background:#4A154B;color:white;">Slack</span>`;
  return badges || '<span class="muted">—</span>';
}

function renderSites(list) {
  document.getElementById('site-count').textContent = list.length + ' site' + (list.length!==1?'s':'');
  const tbody = document.getElementById('sites-tbody');
  if (!list.length) {
    tbody.innerHTML = `<tr><td colspan="7">${emptyState('No sites yet', 'Create your first site to start registering nodes')}</td></tr>`;
    return;
  }
  tbody.innerHTML = list.map(s => `
    <tr class="clickable" onclick="location.href='site-detail.html?id=${s.id}'">
      <td class="td-primary">${esc(s.name)}</td>
      <td class="muted">${esc(s.description||'—')}</td>
      <td><span class="mono">${esc(s.id)}</span></td>
      <td class="muted">${fmtDate(s.created_at)}</td>
      <td>${renderAlertBadges(s)}</td>
      <td><span class="badge badge-neutral" id="nc-${s.id}">—</span></td>
      <td style="text-align:right; width:80px;" onclick="event.stopPropagation()">
        <button class="btn btn-ghost btn-sm" onclick="openEditSite('${esc(s.id)}')">
          <svg viewBox="0 0 20 20" fill="currentColor"><path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z"/></svg>
        </button>
        <button class="btn btn-ghost btn-sm" style="color:var(--danger)" onclick="deleteSite('${esc(s.id)}','${esc(s.name)}')">
          <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"/></svg>
        </button>
      </td>
    </tr>`).join('');
  
  // Load node counts async
  list.forEach(async s => {
    try {
      const nodes = await Sites.nodes(s.id);
      const el = document.getElementById('nc-' + s.id);
      if (el) el.textContent = nodes.length + ' node' + (nodes.length!==1?'s':'');
    } catch {}
  });
}

function filterSites() {
  const q = document.getElementById('site-search').value.toLowerCase();
  renderSites(allSites.filter(s => s.name.toLowerCase().includes(q) || (s.description||'').toLowerCase().includes(q)));
}

async function createSite() {
  const name = document.getElementById('new-site-name').value.trim();
  if (!name) { toast('Name is required', 'warn'); return; }
  const btn = document.getElementById('create-site-btn');
  btn.disabled = true; btn.textContent = 'Creating…';
  
  const payload = { 
    name, 
    description: document.getElementById('new-site-desc').value.trim() || null,
    discord_webhook_url: document.getElementById('new-site-discord').value.trim() || null,
    slack_webhook_url: document.getElementById('new-site-slack').value.trim() || null
  };

  try {
    await Sites.create(payload);
    toast('Site created');
    closeModal('modal-create-site');
    // Reset form
    ['name', 'desc', 'discord', 'slack'].forEach(f => document.getElementById(`new-site-${f}`).value = '');
    await load();
  } catch(e) { toast(e.message, 'error'); }
  
  btn.disabled = false; btn.textContent = 'Create Site';
}

function openEditSite(id) {
  const site = allSites.find(s => s.id === id);
  if (!site) return;
  
  document.getElementById('edit-site-id').value = site.id;
  document.getElementById('edit-site-name').value = site.name || '';
  document.getElementById('edit-site-desc').value = site.description || '';
  document.getElementById('edit-site-discord').value = site.discord_webhook_url || '';
  document.getElementById('edit-site-slack').value = site.slack_webhook_url || '';
  
  openModal('modal-edit-site');
}

async function updateSite() {
  const id = document.getElementById('edit-site-id').value;
  const name = document.getElementById('edit-site-name').value.trim();
  if (!name) { toast('Name is required', 'warn'); return; }
  
  const btn = document.getElementById('edit-site-btn');
  btn.disabled = true; btn.textContent = 'Saving…';

  const payload = {
    name,
    description: document.getElementById('edit-site-desc').value.trim() || null,
    discord_webhook_url: document.getElementById('edit-site-discord').value.trim() || null,
    slack_webhook_url: document.getElementById('edit-site-slack').value.trim() || null
  };

  try {
    // Usa il nuovo endpoint PATCH
    await Sites.patch(id, payload);
    toast('Site updated');
    closeModal('modal-edit-site');
    await load();
  } catch(e) { 
    toast(e.message, 'error'); 
  }
  
  btn.disabled = false; btn.textContent = 'Save Changes';
}

function deleteSite(id, name) {
  confirmAction('Delete Site', `Delete "${name}" and all its tokens? Registered nodes will be orphaned.`, async () => {
    try { await Sites.delete(id); toast('Site deleted'); await load(); }
    catch(e) { toast(e.message, 'error'); }
  });
}

document.getElementById('new-site-name').addEventListener('keydown', e => { if (e.key === 'Enter') createSite(); });
document.getElementById('edit-site-name').addEventListener('keydown', e => { if (e.key === 'Enter') updateSite(); });
load();
</script>
</body>
</html>
