<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>EdgeHub — Sign In</title>
<link rel="stylesheet" href="css/app.css">
<style>
  body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--gray-50)}
  .login-wrap{width:100%;max-width:360px;padding:20px}
  .login-logo{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:28px}
  .login-card{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius-xl);padding:28px;box-shadow:var(--shadow-lg)}
  .login-title{font-size:18px;font-weight:700;color:var(--gray-900);margin-bottom:4px}
  .login-sub{font-size:13px;color:var(--gray-500);margin-bottom:22px}
  .key-icon{width:16px;height:16px;position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--gray-400);pointer-events:none}
  .key-wrap{position:relative}
  .key-wrap .form-input{padding-left:34px}
  .login-error{background:var(--danger-bg);border:1px solid var(--danger-bord);border-radius:var(--radius);padding:9px 12px;font-size:12.5px;color:var(--danger);margin-bottom:14px;display:none}
  .login-footer{text-align:center;margin-top:18px;font-size:12px;color:var(--gray-400)}
</style>
</head>
<body>
<div class="login-wrap page-enter">
  <div class="login-logo">
    <div class="brand-mark"><svg viewBox="0 0 20 20"><path d="M10 2L3 6v4c0 4.4 3 8.5 7 9.5 4-1 7-5.1 7-9.5V6l-7-4z"/></svg></div>
    <span class="brand-name" style="font-size:18px">Edge<em>Hub</em></span>
  </div>
  <div class="login-card">
    <div class="login-title">Welcome back</div>
    <div class="login-sub">Sign in with your admin key to continue.</div>
    <div class="login-error" id="login-err"></div>
    <div class="form-group">
      <label class="form-label">Admin Key</label>
      <div class="key-wrap">
        <svg class="key-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M18 8a6 6 0 01-7.743 5.743L10 14l-1 1-1 1H6v2H2v-4l4.257-4.257A6 6 0 1118 8zm-6-4a1 1 0 100 2 2 2 0 012 2 1 1 0 102 0 4 4 0 00-4-4z" clip-rule="evenodd"/></svg>
        <input type="password" id="admin-key" class="form-input" placeholder="Enter your admin key" autocomplete="current-password">
      </div>
    </div>
    <button class="btn btn-primary btn-wide btn-lg" id="login-btn" onclick="doLogin()">
      <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 3a1 1 0 011 1v12a1 1 0 11-2 0V4a1 1 0 011-1zm7.707 3.293a1 1 0 010 1.414L9.414 9H17a1 1 0 110 2H9.414l1.293 1.293a1 1 0 01-1.414 1.414l-3-3a1 1 0 010-1.414l3-3a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>
      Sign in
    </button>
  </div>
  <div class="login-footer">EdgeHub Edge Fleet Manager</div>
</div>

<script src="js/api.js"></script>
<script>
  // Redirect if already logged in
  Auth.check().then(ok => { if (ok) { const p = new URLSearchParams(location.search).get('next'); location.href = p || 'dashboard.html'; } });

  const keyInput = document.getElementById('admin-key');
  keyInput.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  async function doLogin() {
    const key = keyInput.value.trim();
    if (!key) return;
    const btn = document.getElementById('login-btn');
    const err = document.getElementById('login-err');
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div> Signing in…';
    err.style.display = 'none';
    try {
      await Auth.login(key);
      const next = new URLSearchParams(location.search).get('next');
      location.href = next || 'dashboard.html';
    } catch(e) {
      err.textContent = e.message || 'Invalid admin key';
      err.style.display = 'block';
      btn.disabled = false;
      btn.innerHTML = '<svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 3a1 1 0 011 1v12a1 1 0 11-2 0V4a1 1 0 011-1zm7.707 3.293a1 1 0 010 1.414L9.414 9H17a1 1 0 110 2H9.414l1.293 1.293a1 1 0 01-1.414 1.414l-3-3a1 1 0 010-1.414l3-3a1 1 0 011.414 0z" clip-rule="evenodd"/></svg> Sign in';
    }
  }
</script>
</body>
</html>
