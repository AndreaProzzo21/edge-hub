<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>EdgeHub — Heartbeat Analytics</title>
<link rel="stylesheet" href="css/app.css">
<style>
  .filter-panel {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
    background: var(--gray-50);
    padding: 16px;
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    border-bottom: 1px solid var(--gray-200);
  }
  .filter-group { display: flex; flex-direction: column; gap: 4px; }
  .filter-label { font-size: 11px; font-weight: 600; color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.5px; }
  .filter-select, .filter-input {
    padding: 8px 10px;
    border: 1px solid var(--gray-300);
    border-radius: var(--radius-md);
    background: var(--white);
    font-size: 13px;
    color: var(--gray-700);
    outline: none;
    width: 100%;
    box-sizing: border-box;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .filter-select:focus, .filter-input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 2px rgba(59,130,246,0.15);
  }
  .filter-select:disabled, .filter-input:disabled {
    opacity: 0.45;
    cursor: not-allowed;
    background: var(--gray-50);
  }
  /* Input datetime elegante */
  .filter-input[type="datetime-local"] {
    color-scheme: light;
    font-family: inherit;
    letter-spacing: 0.01em;
  }
  .filter-input[type="datetime-local"]:not(:disabled) {
    background: var(--white);
    border-color: var(--gray-300);
  }
  .filter-input.input-error {
    border-color: var(--danger) !important;
    box-shadow: 0 0 0 2px rgba(239,68,68,0.12) !important;
  }
  .filter-input.input-warn {
    border-color: #f59e0b !important;
    box-shadow: 0 0 0 2px rgba(245,158,11,0.12) !important;
  }
  .field-hint {
    font-size: 11px;
    margin-top: 3px;
    min-height: 14px;
    transition: color 0.15s;
  }
  .field-hint.err  { color: var(--danger); }
  .field-hint.warn { color: #b45309; }
  .field-hint.ok   { color: var(--success); }

  .filter-actions { display: flex; align-items: flex-end; gap: 8px; }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
  }
  .stat-chip {
    background: var(--white);
    border: 1px solid var(--gray-200);
    border-radius: var(--radius-lg);
    padding: 12px 16px;
    box-shadow: var(--shadow-sm);
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .stat-chip-val   { font-size: 22px; font-weight: 700; color: var(--gray-900); }
  .stat-chip-label { font-size: 11px; font-weight: 600; color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-chip.accent-cpu   { border-left: 3px solid var(--primary); }
  .stat-chip.accent-mem   { border-left: 3px solid #8b5cf6; }
  .stat-chip.accent-disk  { border-left: 3px solid #f59e0b; }

  .chart-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 20px;
  }
  @media (max-width: 900px) { .chart-grid { grid-template-columns: 1fr; } }
  .chart-card {
    background: var(--white);
    border: 1px solid var(--gray-200);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-sm);
    padding: 16px;
  }
  .chart-title {
    font-size: 13px; font-weight: 600; color: var(--gray-700);
    margin-bottom: 12px; display: flex; align-items: center; gap: 6px;
  }
  .chart-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  canvas { width: 100% !important; }

  .table-compact th, .table-compact td { padding: 9px 14px; font-size: 12px; }
  .table-compact tbody tr:hover { background: var(--gray-50); }

  .pagination-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 16px; background: var(--white);
    border-top: 1px solid var(--gray-200);
    border-radius: 0 0 var(--radius-md) var(--radius-md);
  }
  .page-info { font-size: 13px; color: var(--gray-500); }
  .page-controls { display: flex; gap: 8px; align-items: center; }
  .btn-page {
    background: var(--white); border: 1px solid var(--gray-300);
    border-radius: var(--radius-sm); padding: 4px 10px;
    font-size: 13px; color: var(--gray-700); cursor: pointer; transition: all 0.1s;
  }
  .btn-page:hover:not(:disabled) { background: var(--gray-100); }
  .btn-page:disabled { opacity: 0.5; cursor: not-allowed; }
  .page-current { font-size: 13px; font-weight: 600; color: var(--gray-900); padding: 0 8px; }

  .empty-filters {
    padding: 60px 20px; text-align: center; color: var(--gray-400);
  }
  .empty-filters svg { width: 40px; height: 40px; margin-bottom: 12px; opacity: 0.4; }
  .empty-filters p { font-size: 14px; font-weight: 500; color: var(--gray-500); margin: 0 0 4px; }
  .empty-filters span { font-size: 13px; color: var(--gray-400); }

  .tail-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600;
    background: var(--gray-100); color: var(--gray-600);
  }
</style>
</head>
<body>
<div class="shell">
  <div id="sidebar-mount"></div>
  <div class="main">
    <div class="topbar">
      <div class="breadcrumb"><span class="breadcrumb-cur">Heartbeat Analytics</span></div>
      <div class="topbar-gap"></div>
      <button class="btn btn-secondary btn-sm" id="btn-export" onclick="exportCSV()" disabled>
        <svg style="width:14px;height:14px" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd"/></svg>
        Export CSV
      </button>
    </div>

    <div class="page-body page-enter">

      <!-- FILTRI -->
      <div class="card" style="padding:0; margin-bottom:20px;">
        <div class="filter-panel">

          <div class="filter-group">
            <label class="filter-label">Site</label>
            <select class="filter-select" id="filter-site" onchange="onSiteChange()">
              <option value="">Select a site…</option>
            </select>
          </div>

          <div class="filter-group">
            <label class="filter-label">Node</label>
            <select class="filter-select" id="filter-node" onchange="onNodeChange()" disabled>
              <option value="">Select a node…</option>
            </select>
          </div>

          <div class="filter-group">
            <label class="filter-label">Tail (last N records)</label>
            <select class="filter-select" id="filter-tail" onchange="onTailChange()" disabled>
              <option value="50">Last 50</option>
              <option value="100" selected>Last 100</option>
              <option value="250">Last 250</option>
              <option value="500">Last 500</option>
              <option value="0">Custom range →</option>
            </select>
          </div>

          <div class="filter-group">
            <label class="filter-label">From</label>
            <input type="datetime-local" class="filter-input" id="filter-from" disabled oninput="validateDates()">
            <div class="field-hint" id="hint-from"></div>
          </div>

          <div class="filter-group">
            <label class="filter-label">To <span style="font-size:10px;font-weight:400;color:var(--gray-400)">(blank = now)</span></label>
            <input type="datetime-local" class="filter-input" id="filter-to" disabled oninput="validateDates()">
            <div class="field-hint" id="hint-to"></div>
          </div>

          <div class="filter-actions">
            <button class="btn btn-primary" id="btn-search" onclick="runSearch()" disabled style="width:100%">
              <svg style="width:14px;height:14px" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/></svg>
              Search
            </button>
          </div>

        </div>
      </div>

      <!-- RISULTATI -->
      <div id="results-area">
        <div class="empty-filters">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 15.803 7.5 7.5 0 0016.803 15.803z"/>
          </svg>
          <p>Select a site and node to begin</p>
          <span>Use the filters above to query heartbeat history</span>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="js/api.js"></script>
<script>
document.getElementById('sidebar-mount').innerHTML = SIDEBAR_HTML;

let allNodes = [];
let currentResults = [];
let currentPage = 1;
const itemsPerPage = 20;

async function init() {
  if (!(await requireAuth())) return;
  try {
    allNodes = await Nodes.list();
    populateSites();
  } catch(e) { toast(e.message, 'error'); }
}

// ---------------------------------------------------------------------------
// DROPDOWN CASCADE
// ---------------------------------------------------------------------------

function populateSites() {
  const sites = [...new Set(allNodes.map(n => n.site_id).filter(Boolean))].sort();
  const sel = document.getElementById('filter-site');
  sel.innerHTML = '<option value="">Select a site…</option>' +
    sites.map(s => `<option value="${s}">${s}</option>`).join('');
}

function onSiteChange() {
  const siteId  = document.getElementById('filter-site').value;
  const nodeSel = document.getElementById('filter-node');

  nodeSel.innerHTML = '<option value="">Select a node…</option>';
  nodeSel.disabled  = !siteId;
  document.getElementById('filter-tail').disabled    = true;
  document.getElementById('filter-from').disabled    = true;
  document.getElementById('filter-to').disabled      = true;
  document.getElementById('btn-search').disabled     = true;
  document.getElementById('btn-export').disabled     = true;
  clearHints();

  if (!siteId) return;

  const siteNodes = allNodes
    .filter(n => n.site_id === siteId)
    .sort((a, b) => (a.hostname||'').localeCompare(b.hostname||''));

  nodeSel.innerHTML = '<option value="">Select a node…</option>' +
    siteNodes.map(n => `<option value="${n.id}">${esc(n.hostname || n.id)}</option>`).join('');
}

function onNodeChange() {
  const nodeId = document.getElementById('filter-node').value;
  document.getElementById('filter-tail').disabled  = !nodeId;
  document.getElementById('btn-search').disabled   = !nodeId;
  clearHints();

  // Ricalcola stato campi date in base al tail corrente
  if (nodeId) onTailChange();
}

function onTailChange() {
  const nodeId   = document.getElementById('filter-node').value;
  const isCustom = document.getElementById('filter-tail').value === '0';
  const fromIn   = document.getElementById('filter-from');
  const toIn     = document.getElementById('filter-to');

  fromIn.disabled = !isCustom || !nodeId;
  toIn.disabled   = !isCustom || !nodeId;

  // Pulisce i valori e gli hint quando si torna a tail numerico
  if (!isCustom) {
    fromIn.value = '';
    toIn.value   = '';
    clearHints();
  }
}

// ---------------------------------------------------------------------------
// VALIDAZIONE DATE — chiamata ad ogni oninput
// ---------------------------------------------------------------------------

function clearHints() {
  setHint('from', '', '');
  setHint('to',   '', '');
  document.getElementById('filter-from').classList.remove('input-error','input-warn');
  document.getElementById('filter-to').classList.remove('input-error','input-warn');
}

function setHint(field, type, msg) {
  const el = document.getElementById(`hint-${field}`);
  el.textContent = msg;
  el.className   = 'field-hint' + (type ? ` ${type}` : '');
}

function validateDates() {
  const fromEl = document.getElementById('filter-from');
  const toEl   = document.getElementById('filter-to');
  const fromVal = fromEl.value;
  const toVal   = toEl.value;
  const now     = new Date();

  let fromOk = true;
  let toOk   = true;

  fromEl.classList.remove('input-error','input-warn');
  toEl.classList.remove('input-error','input-warn');
  setHint('from', '', '');
  setHint('to',   '', '');

  // --- Valida FROM ---
  if (fromVal) {
    const fromDate = new Date(fromVal);
    if (fromDate > now) {
      fromEl.classList.add('input-error');
      setHint('from', 'err', 'Cannot be in the future');
      fromOk = false;
    }
  }

  // --- Valida TO ---
  if (toVal) {
    const toDate = new Date(toVal);
    if (toDate > now) {
      toEl.classList.add('input-warn');
      setHint('to', 'warn', 'Will be capped to now on search');
    }
  }

  // --- Valida FROM < TO ---
  if (fromVal && toVal && fromOk) {
    const fromDate = new Date(fromVal);
    const toDate   = new Date(toVal);
    if (fromDate >= toDate) {
      fromEl.classList.add('input-error');
      toEl.classList.add('input-error');
      setHint('from', 'err', '"From" must be earlier than "To"');
      fromOk = false;
      toOk   = false;
    }
  }

  // --- Hint ok su FROM se tutto bene e c'è un valore ---
  if (fromVal && fromOk) {
    setHint('from', 'ok', 'Valid');
  }

  return fromOk && toOk;
}

// ---------------------------------------------------------------------------
// RICERCA
// ---------------------------------------------------------------------------

async function runSearch() {
  const nodeId  = document.getElementById('filter-node').value;
  const tail    = parseInt(document.getElementById('filter-tail').value);
  const fromEl  = document.getElementById('filter-from');
  const toEl    = document.getElementById('filter-to');
  const fromVal = fromEl.value;
  const toVal   = toEl.value;
  const now     = new Date();

  if (!nodeId) { toast('Select a node first', 'error'); return; }

  // Validazione range custom
  if (tail === 0) {
    if (!fromVal) {
      fromEl.classList.add('input-error');
      setHint('from', 'err', 'Required for custom range');
      return;
    }
    if (!validateDates()) return;
  }

  document.getElementById('results-area').innerHTML =
    '<div class="loader-row" style="padding:40px"><div class="spinner"></div> Fetching heartbeats…</div>';

  try {
    let data;

    if (tail === 0) {
      const params = new URLSearchParams();
      params.set('from_ts', new Date(fromVal).toISOString());

      // Se to è nel futuro o assente → non inviarlo, il backend cappera a now
      if (toVal) {
        const toDate = new Date(toVal);
        params.set('to_ts', (toDate > now ? now : toDate).toISOString());
      }

      params.set('limit', 2000);
      data = await get(`/nodes/${nodeId}/heartbeats/range?${params}`);
    } else {
      data = await Nodes.heartbeats(nodeId, tail || 100);
    }

    currentResults = data || [];
    currentPage    = 1;
    document.getElementById('btn-export').disabled = currentResults.length === 0;
    renderResults();
  } catch(e) {
    document.getElementById('results-area').innerHTML =
      `<div style="color:var(--danger);padding:20px">${esc(e.message)}</div>`;
  }
}

// ---------------------------------------------------------------------------
// RENDER
// ---------------------------------------------------------------------------

function renderResults() {
  const area = document.getElementById('results-area');

  if (currentResults.length === 0) {
    area.innerHTML = `<div class="empty-filters">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 002.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 00-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 00.75-.75 2.25 2.25 0 00-.1-.664m-5.8 0A2.251 2.251 0 0113.5 2.25H15c1.012 0 1.867.668 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m0 0H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V9.375c0-.621-.504-1.125-1.125-1.125H8.25z"/>
      </svg>
      <p>No heartbeats found</p>
      <span>Try adjusting the time range or tail size</span>
    </div>`;
    return;
  }

  const cpuVals  = currentResults.map(h => h.cpu_usage).filter(v => v != null);
  const memVals  = currentResults.map(h => h.memory_usage).filter(v => v != null);
  const diskVals = currentResults.map(h => h.disk_usage).filter(v => v != null);
  const tempVals = currentResults.map(h => h.extra_data?.cpu_temp_celsius).filter(v => v != null);

  const avg = arr => arr.length ? (arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(1) : '—';
  const max = arr => arr.length ? Math.max(...arr).toFixed(1) : '—';

  const nodeName = document.getElementById('filter-node').selectedOptions[0]?.text || '';
  const tail     = document.getElementById('filter-tail').value;
  const tailLabel = tail === '0' ? 'Custom range' :
    document.getElementById('filter-tail').selectedOptions[0]?.text || '';

  // Grafici: ordine cronologico, max 200 punti
  const chartData = [...currentResults].reverse();
  const step      = Math.max(1, Math.floor(chartData.length / 200));
  const sampled   = chartData.filter((_, i) => i % step === 0);
  const labels    = sampled.map(h => fmtDateShort(h.timestamp));

  area.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div>
        <div style="font-size:15px;font-weight:600;color:var(--gray-900)">${esc(nodeName)}</div>
        <div style="font-size:12px;color:var(--gray-500);margin-top:2px">
          <span class="tail-badge">${esc(tailLabel)}</span>
          &nbsp;${currentResults.length} records &nbsp;·&nbsp;
          ${fmtDate(currentResults[currentResults.length-1]?.timestamp)} → ${fmtDate(currentResults[0]?.timestamp)}
        </div>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-chip accent-cpu">
        <div class="stat-chip-label">Avg CPU</div>
        <div class="stat-chip-val">${avg(cpuVals)}%</div>
      </div>
      <div class="stat-chip accent-cpu">
        <div class="stat-chip-label">Peak CPU</div>
        <div class="stat-chip-val">${max(cpuVals)}%</div>
      </div>
      <div class="stat-chip accent-mem">
        <div class="stat-chip-label">Avg RAM</div>
        <div class="stat-chip-val">${avg(memVals)}%</div>
      </div>
      <div class="stat-chip accent-mem">
        <div class="stat-chip-label">Peak RAM</div>
        <div class="stat-chip-val">${max(memVals)}%</div>
      </div>
      <div class="stat-chip accent-disk">
        <div class="stat-chip-label">Avg Disk</div>
        <div class="stat-chip-val">${avg(diskVals)}%</div>
      </div>
      <div class="stat-chip accent-disk">
        <div class="stat-chip-label">Peak Disk</div>
        <div class="stat-chip-val">${max(diskVals)}%</div>
      </div>
      ${tempVals.length ? `
      <div class="stat-chip" style="border-left:3px solid #ef4444">
        <div class="stat-chip-label">Peak Temp</div>
        <div class="stat-chip-val">${max(tempVals)}°C</div>
      </div>` : ''}
    </div>

    <div class="chart-grid">
      <div class="chart-card">
        <div class="chart-title"><span class="chart-dot" style="background:#3b82f6"></span>CPU Usage %</div>
        <canvas id="chart-cpu" height="120"></canvas>
      </div>
      <div class="chart-card">
        <div class="chart-title"><span class="chart-dot" style="background:#8b5cf6"></span>Memory Usage %</div>
        <canvas id="chart-mem" height="120"></canvas>
      </div>
      <div class="chart-card">
        <div class="chart-title"><span class="chart-dot" style="background:#f59e0b"></span>Disk Usage %</div>
        <canvas id="chart-disk" height="120"></canvas>
      </div>
      ${tempVals.length ? `
      <div class="chart-card">
        <div class="chart-title"><span class="chart-dot" style="background:#ef4444"></span>CPU Temperature °C</div>
        <canvas id="chart-temp" height="120"></canvas>
      </div>` : ''}
    </div>

    <div class="card" style="padding:0">
      <div class="table-wrap">
        <table class="table-compact">
          <thead><tr>
            <th>Timestamp</th><th>CPU</th><th>RAM</th><th>Disk</th>
            <th>Temp</th><th>Uptime</th><th>IP</th>
          </tr></thead>
          <tbody id="hb-tbody"></tbody>
        </table>
      </div>
      <div class="pagination-bar">
        <div class="page-info" id="hb-page-info">—</div>
        <div class="page-controls">
          <button class="btn-page" id="hb-btn-prev" onclick="changePage(-1)">Previous</button>
          <span class="page-current" id="hb-page-current">Page 1</span>
          <button class="btn-page" id="hb-btn-next" onclick="changePage(1)">Next</button>
        </div>
      </div>
    </div>
  `;

  drawChart('chart-cpu',  labels, sampled.map(h => h.cpu_usage),   '#3b82f6', 100);
  drawChart('chart-mem',  labels, sampled.map(h => h.memory_usage), '#8b5cf6', 100);
  drawChart('chart-disk', labels, sampled.map(h => h.disk_usage),   '#f59e0b', 100);
  if (tempVals.length)
    drawChart('chart-temp', labels, sampled.map(h => h.extra_data?.cpu_temp_celsius ?? null), '#ef4444', null);

  renderTablePage();
}

function drawChart(canvasId, labels, data, color, maxY) {
  const ctx = document.getElementById(canvasId);
  if (!ctx) return;
  new Chart(ctx, {
    type: 'line',
    data: { labels, datasets: [{
      data, borderColor: color, backgroundColor: color + '18',
      borderWidth: 1.5, pointRadius: 0, pointHoverRadius: 3,
      fill: true, tension: 0.3, spanGaps: true,
    }]},
    options: {
      responsive: true, animation: false,
      plugins: { legend: { display: false }, tooltip: {
        callbacks: { label: c => ` ${c.parsed.y != null ? c.parsed.y.toFixed(1) : '—'}` }
      }},
      scales: {
        x: { display: false },
        y: {
          min: 0, max: maxY || undefined,
          grid: { color: 'rgba(0,0,0,0.05)' },
          ticks: { font: { size: 10 }, color: '#9ca3af', maxTicksLimit: 5 }
        }
      }
    }
  });
}

function renderTablePage() {
  const tbody = document.getElementById('hb-tbody');
  if (!tbody) return;

  const total      = currentResults.length;
  const totalPages = Math.ceil(total / itemsPerPage) || 1;
  if (currentPage < 1) currentPage = 1;
  if (currentPage > totalPages) currentPage = totalPages;

  const start = (currentPage - 1) * itemsPerPage;
  const end   = Math.min(start + itemsPerPage, total);
  const page  = currentResults.slice(start, end);

  document.getElementById('hb-page-info').textContent    = `Showing ${start+1}–${end} of ${total}`;
  document.getElementById('hb-page-current').textContent = `Page ${currentPage} of ${totalPages}`;
  document.getElementById('hb-btn-prev').disabled = currentPage === 1;
  document.getElementById('hb-btn-next').disabled = currentPage === totalPages;

  tbody.innerHTML = page.map(h => {
    const temp = h.extra_data?.cpu_temp_celsius;
    return `<tr>
      <td class="mono" style="color:var(--gray-600);white-space:nowrap">${fmtDate(h.timestamp)}</td>
      <td>${miniBar(h.cpu_usage)}</td>
      <td>${miniBar(h.memory_usage)}</td>
      <td>${miniBar(h.disk_usage)}</td>
      <td class="mono" style="font-size:11px">${temp != null ? temp.toFixed(1)+'°C' : '<span class="muted">—</span>'}</td>
      <td class="mono muted" style="font-size:11px">${fmtUptime(h.uptime_seconds)}</td>
      <td class="mono muted" style="font-size:11px">${esc(h.ip_address||'—')}</td>
    </tr>`;
  }).join('');
}

function changePage(delta) {
  currentPage += delta;
  renderTablePage();
  document.querySelector('#results-area .card')?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function miniBar(val) {
  if (val == null) return '<span class="muted">—</span>';
  return `<div class="row" style="gap:5px;width:80px">
    <div class="prog"><div class="prog-bar ${barCls(val)}" style="width:${Math.min(val,100)}%"></div></div>
    <span class="mono" style="font-size:11px">${fmtPct(val)}</span>
  </div>`;
}

function exportCSV() {
  if (!currentResults.length) return;
  const nodeName = document.getElementById('filter-node').selectedOptions[0]?.text || 'node';
  const rows = [
    ['timestamp','cpu_usage','memory_usage','disk_usage','cpu_temp_celsius','uptime_seconds','ip_address'],
    ...currentResults.map(h => [
      h.timestamp, h.cpu_usage ?? '', h.memory_usage ?? '',
      h.disk_usage ?? '', h.extra_data?.cpu_temp_celsius ?? '',
      h.uptime_seconds ?? '', h.ip_address ?? ''
    ])
  ];
  const csv  = rows.map(r => r.join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `heartbeats_${nodeName.replace(/[^a-z0-9]/gi,'_')}_${Date.now()}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

function fmtDateShort(ts) {
  if (!ts) return '';
  return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

init();
</script>
</body>
</html>
