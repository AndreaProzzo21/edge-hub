services:
  # PostgreSQL: Primary database for node metadata, telemetry, and site configs
  postgres:
    image: postgres:17
    container_name: edgehub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-edgehub}
      POSTGRES_USER: ${POSTGRES_USER:-edgehub-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_this_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-edgehub-user} -d ${POSTGRES_DB:-edgehub}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'        # Max 1 CPU core
          memory: 1G         # Max 1GB RAM
        reservations:
          cpus: '0.2'
          memory: 256M

  # EdgeHub Backend: The Control Plane (FastAPI)
  backend:
    image: aprozzo/edgehub-backend:latest
    container_name: edgehub-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    deploy:
      resources:
        limits:
          cpus: '1.0'        # Max 1 CPU core
          memory: 512M       # Max 512MB RAM
        reservations:
          cpus: '0.1'
          memory: 128M

  # EdgeHub Frontend: Nginx serving the dashboard and handling routing
  nginx:
    image: aprozzo/edgehub-frontend:latest
    container_name: edgehub-nginx
    restart: unless-stopped
    ports:
      - "${EDGEHUB_PORT:-80}:80"
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          cpus: '0.5'        # Max half a CPU core
          memory: 256M       # Max 256MB RAM
        reservations:
          cpus: '0.1'
          memory: 64M

volumes:
  postgres_data: