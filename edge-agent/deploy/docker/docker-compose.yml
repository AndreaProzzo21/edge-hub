services:
  edge-agent:
    image: aprozzo/edgehub-agent:latest
    container_name: edgehub-agent
    restart: unless-stopped
    # Montiamo il file di stato per mantenere il JWT tra i riavvii
    volumes:
      - ./data:/app/data:rw
      # Montiamo il socket per permettere all'agente di leggere i container
      - /var/run/docker.sock:/var/run/docker.sock:ro
    # Carichiamo le variabili dal file .env generato dallo script
    env_file:
      - .env
    environment:
      - EDGEHUB_STATE_FILE=/app/data/edgehub-state.json
    tmpfs:
      - /tmp
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
