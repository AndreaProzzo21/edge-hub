# ==============================================================================
#  EdgeHub Agent — Docker Compose
# ==============================================================================
#
#  This file is downloaded automatically by the installer script.
#  Configuration is injected via the .env file generated by the installer.
#
#  To manage the agent manually:
#    docker compose up -d        # start
#    docker compose down         # stop
#    docker compose logs -f      # follow logs
#    docker compose pull && docker compose up -d  # update to latest image
# ==============================================================================

services:
  edge-agent:
    image: aprozzo/edgehub-agent:latest
    container_name: edgehub-agent

    # Restart only on crash (non-zero exit).
    # If the agent shuts down cleanly after a revocation (exit 0),
    # Docker will NOT restart it — intentional behaviour.
    restart: unless-stopped

    # -------------------------------------------------------------------------
    #  Host observability — required for accurate metrics
    # -------------------------------------------------------------------------

    # Share the host PID namespace so gopsutil can enumerate all real processes,
    # including their states (running / sleeping / zombie).
    pid: "host"

    # Use the host network stack directly so the agent reports the real NIC,
    # real IP address, and real network I/O counters instead of the container's.
    network_mode: "host"

    # -------------------------------------------------------------------------
    #  Volumes
    # -------------------------------------------------------------------------
    volumes:
      # Persistent state — stores the JWT token so it survives container restarts.
      - ./data:/app/data:rw

      # Docker socket — read-only access to enumerate containers (docker mode).
      - /var/run/docker.sock:/var/run/docker.sock:ro

      # Host filesystem — read-only mount so gopsutil reads disk usage, /proc,
      # /sys and /etc from the real host rather than the container overlay.
      - /:/hostfs:ro

    # -------------------------------------------------------------------------
    #  Environment
    # -------------------------------------------------------------------------
    env_file:
      - .env

    environment:
      # Tell gopsutil where to find host-level system information.
      # Without these, disk/CPU/memory metrics reflect the container, not the host.
      - HOST_PROC=/hostfs/proc
      - HOST_SYS=/hostfs/sys
      - HOST_ETC=/hostfs/etc
      - HOST_ROOT=/hostfs

    # -------------------------------------------------------------------------
    #  Logging — capped to avoid filling the host disk
    # -------------------------------------------------------------------------
    tmpfs:
      - /tmp

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"