services:
  edge-agent:
    image: aprozzo/edgehub-agent:latest
    container_name: edgehub-agent
    restart: unless-stopped
    # Montiamo il file di stato per mantenere il JWT tra i riavvii
    volumes:
      - ./edgehub-state.json:/app/edgehub-state.json:rw
      # Montiamo il socket per permettere all'agente di leggere i container
      - /var/run/docker.sock:/var/run/docker.sock:ro
    # Carichiamo le variabili dal file .env generato dallo script
    env_file:
      - .env
    # Manteniamo il container il più isolato possibile
    read_only: true
    tmpfs:
      - /tmp
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"