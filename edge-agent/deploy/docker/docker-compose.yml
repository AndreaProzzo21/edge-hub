services:
  edge-agent:
    image: aprozzo/edgehub-agent:latest
    container_name: edgehub-agent
    restart: unless-stopped
    
    # --- FONDAMENTALI PER L'OSSERVABILITÀ DELL'HOST ---
    pid: "host"           # Permette di vedere tutti i processi della macchina reale
    network_mode: "host"  # Usa la vera scheda di rete dell'host (IP reale, traffico reale)
    # -----------------------------------------------------------

    volumes:
      - ./data:/app/data:rw
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Montiamo la root dell'host in sola lettura per leggere lo spazio disco reale
      - /:/hostfs:ro
      
    env_file:
      - .env
    environment:
      - EDGEHUB_STATE_FILE=/app/data/edgehub-state.json
      # Passiamo variabili ambientali usate dalla libreria gopsutil
      - HOST_PROC=/proc
      - HOST_SYS=/sys
      - HOST_ETC=/etc
    tmpfs:
      - /tmp
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"