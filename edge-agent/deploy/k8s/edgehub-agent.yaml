# ==============================================================================
#  EdgeHub Agent — Kubernetes Manifest
# ==============================================================================
#
#  This file is downloaded and applied automatically by the installer script.
#  Review and customise before applying if needed:
#
#    kubectl apply -f edgehub-agent.yaml -n <namespace>
#
#  To manage the agent manually after installation:
#    kubectl get pods -n edgehub-system
#    kubectl logs -f deployment/edgehub-agent -n edgehub-system
#    kubectl delete -f edgehub-agent.yaml -n edgehub-system
# ==============================================================================

---
# 1. ServiceAccount
# Identity used by the Pod to authenticate against the Kubernetes API Server.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: edgehub-agent-sa
  namespace: EDGEHUB_NAMESPACE_PLACEHOLDER

---
# 2. ClusterRole
# Defines exactly which API resources the agent can read.
# Intentionally read-only — the agent never writes to the cluster.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: edgehub-agent-role
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list"]

---
# 3. ClusterRoleBinding
# Binds the ClusterRole to the ServiceAccount above.
# Must reference the correct namespace where the agent is deployed.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: edgehub-agent-rolebinding
subjects:
  - kind: ServiceAccount
    name: edgehub-agent-sa
    namespace: EDGEHUB_NAMESPACE_PLACEHOLDER
roleRef:
  kind: ClusterRole
  name: edgehub-agent-role
  apiGroup: rbac.authorization.k8s.io

---
# 4. PersistentVolumeClaim
# Small persistent volume to store edgehub-state.json (the JWT token).
# Survives Pod restarts and rescheduling — without it the agent re-registers
# on every restart, generating a new node entry on the backend.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: edgehub-agent-pvc
  namespace: EDGEHUB_NAMESPACE_PLACEHOLDER
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Mi

---
# 5. Deployment
# Single replica — one agent per cluster, not one per node.
# The agent collects cluster-wide metrics via the API Server.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: edgehub-agent
  namespace: EDGEHUB_NAMESPACE_PLACEHOLDER
  labels:
    app: edgehub-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: edgehub-agent
  template:
    metadata:
      labels:
        app: edgehub-agent
    spec:
      serviceAccountName: edgehub-agent-sa

      # Share host network and PID namespace so gopsutil can read real NIC
      # metrics and enumerate all processes on the underlying node.
      hostNetwork: true
      hostPID: true

      # Graceful shutdown — gives the agent up to 15s to finish in-flight
      # HTTP requests and close connections cleanly before SIGKILL.
      terminationGracePeriodSeconds: 15

      containers:
        - name: agent
          image: aprozzo/edgehub-agent:latest
          imagePullPolicy: Always

          # Base configuration injected from the Secret generated by the installer.
          envFrom:
            - secretRef:
                name: edgehub-agent-config

          # Tell gopsutil to read system information from the host filesystem
          # mounted below, not from the container's Alpine overlay.
          env:
            - name: HOST_PROC
              value: "/hostfs/proc"
            - name: HOST_SYS
              value: "/hostfs/sys"
            - name: HOST_ETC
              value: "/hostfs/etc"
            - name: HOST_ROOT
              value: "/hostfs"

          volumeMounts:
            # Persistent storage for the JWT state file.
            - name: edgehub-data
              mountPath: /data
            # Host filesystem — read-only, required for accurate disk/CPU/memory metrics.
            - name: hostfs
              mountPath: /hostfs
              readOnly: true

          # Resource limits — prevents the agent from starving workloads on the node.
          # Adjust if you observe OOMKill events in high-churn clusters.
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi

      volumes:
        - name: edgehub-data
          persistentVolumeClaim:
            claimName: edgehub-agent-pvc
        - name: hostfs
          hostPath:
            path: /
            type: Directory